<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Журнал посещаемости плавания</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="brand">
          <div class="brand-mark">A</div>
          <div>
            <p class="eyebrow">тренерский журнал</p>
            <h1>Посещаемость</h1>
          </div>
        </header>

        <section class="panel">
          <div class="panel-heading">
            <h2>Группы</h2>
            <button class="icon-button" id="newGroupButton" type="button" aria-label="Новая группа" title="Новая группа">
              <i data-lucide="plus"></i>
            </button>
          </div>
          <div class="group-list" id="groupList"></div>
        </section>

        <section class="panel group-editor" id="groupEditor">
          <div class="panel-heading">
            <h2 id="groupFormTitle">Группа</h2>
            <button class="icon-button danger" id="deleteGroupButton" type="button" aria-label="Удалить группу" title="Удалить группу">
              <i data-lucide="trash-2"></i>
            </button>
          </div>

          <form id="groupForm">
            <label>
              <span>Название</span>
              <input id="groupNameInput" type="text" placeholder="Например: Дельфины" required />
            </label>

            <div class="time-grid">
              <label>
                <span>Начало</span>
                <input id="groupStartInput" type="time" required />
              </label>
              <label>
                <span>Конец</span>
                <input id="groupEndInput" type="time" />
              </label>
            </div>

            <fieldset>
              <legend>Дни тренировок</legend>
              <div class="day-pills" id="dayPills"></div>
            </fieldset>

            <button class="primary-button" type="submit">
              <i data-lucide="save"></i>
              Сохранить
            </button>
          </form>
        </section>
      </aside>

      <main class="workspace">
        <section class="topbar">
          <div>
            <p class="eyebrow">активная группа</p>
            <h2 id="activeGroupTitle">Группа</h2>
            <p class="muted" id="activeGroupSchedule"></p>
          </div>

          <div class="toolbar">
            <button class="icon-button" id="prevMonthButton" type="button" aria-label="Предыдущий месяц" title="Предыдущий месяц">
              <i data-lucide="chevron-left"></i>
            </button>
            <input id="monthInput" type="month" />
            <button class="icon-button" id="nextMonthButton" type="button" aria-label="Следующий месяц" title="Следующий месяц">
              <i data-lucide="chevron-right"></i>
            </button>
            <button class="secondary-button" id="exportButton" type="button">
              <i data-lucide="download"></i>
              CSV
            </button>
          </div>
        </section>

        <section class="student-strip">
          <form id="studentForm" class="student-form">
            <label>
              <span>Новый ученик</span>
              <input id="studentNameInput" type="text" placeholder="Имя и фамилия" required />
            </label>
            <button class="primary-button" type="submit">
              <i data-lucide="user-plus"></i>
              Добавить
            </button>
          </form>

          <div class="stats" id="stats"></div>
        </section>

        <section class="journal-wrap">
          <div class="journal-scroll">
            <table class="journal-table" id="journalTable"></table>
          </div>
          <div class="empty-state" id="emptyState">
            <i data-lucide="calendar-days"></i>
            <h3>Выберите группу и добавьте учеников</h3>
            <p>После этого здесь появится журнал с датами тренировок выбранного месяца.</p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
